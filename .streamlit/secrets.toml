[bling]
# Preencha com os dados do aplicativo criado no Bling.
# Nunca publique credenciais reais no GitHub.
client_id = "SEU_CLIENT_ID"
client_secret = "SEU_CLIENT_SECRET"

# Use a URL EXATA cadastrada no app do Bling.
# Exemplo Streamlit Cloud: https://SEU-APP.streamlit.app
# Exemplo local: http://localhost:8501
redirect_uri = "https://SEU-APP.streamlit.app"

authorize_url = "https://www.bling.com.br/Api/v3/oauth/authorize"
token_url = "https://www.bling.com.br/Api/v3/oauth/token"
revoke_url = "https://www.bling.com.br/Api/v3/oauth/revoke"
api_base_url = "https://api.bling.com.br/Api/v3"

# Caminho local para persistência dos tokens.
# Em produção, o ideal é usar armazenamento seguro no backend.
token_store_path = "bling_app_zero/output/bling_tokens.json"

# Mantido por compatibilidade com o fluxo atual.
stock_write_path = "/estoques"
