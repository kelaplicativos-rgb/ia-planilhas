[bling]
client_id = "COLOQUE_AQUI_O_NOVO_CLIENT_ID"
client_secret = "COLOQUE_AQUI_O_NOVO_CLIENT_SECRET"

# URL pública exata da sua app no Streamlit.
# Esta mesma URL precisa estar cadastrada no app do Bling.
redirect_uri = "https://ia-planilhas-bling.streamlit.app/"

authorize_url = "https://www.bling.com.br/Api/v3/oauth/authorize"
token_url = "https://www.bling.com.br/Api/v3/oauth/token"
revoke_url = "https://www.bling.com.br/Api/v3/oauth/revoke"
api_base_url = "https://api.bling.com.br/Api/v3"

token_store_path = "bling_app_zero/output/bling_tokens.json"
stock_write_path = "/estoques"

[security]
admin_key = "COLOQUE_AQUI_UMA_CHAVE_ADMIN_FORTE_E_NOVA"

[app]
public_base_url = "https://ia-planilhas-bling.streamlit.app/"
app_name = "IA Planilhas Bling"
environment = "production"
