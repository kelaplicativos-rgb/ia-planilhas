name: Android Collector APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android_collector/**'
      - '.github/workflows/android-collector-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp

      - name: Build debug APK
        run: /tmp/gradle-8.10.2/bin/gradle -p android_collector assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp android_collector/app/build/outputs/apk/debug/app-debug.apk dist/mapeiaai-coletor-android.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapeiaai-coletor-android-apk
          path: dist/mapeiaai-coletor-android.apk

      - name: Publish latest APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view android-coletor-latest >/dev/null 2>&1 || gh release create android-coletor-latest --title "MapeiaAI Coletor Android" --notes "APK Android do coletor automático MapeiaAI."
          gh release upload android-coletor-latest dist/mapeiaai-coletor-android.apk --clobber
