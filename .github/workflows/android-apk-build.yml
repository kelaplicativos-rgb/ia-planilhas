name: Android APK Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android_collector/**'
      - '.github/workflows/android-apk-build.yml'
  push:
    branches:
      - main
    paths:
      - 'android_collector/**'
      - '.github/workflows/android-apk-build.yml'

jobs:
  build-apk:
    name: Build Android collector APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        working-directory: android_collector
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: android_collector
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android_collector/app/build/outputs/apk/debug/*.apk artifacts/mapeiaai-coletor-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapeiaai-coletor-android-debug-apk
          path: artifacts/mapeiaai-coletor-android-debug.apk
          if-no-files-found: error
          retention-days: 14
