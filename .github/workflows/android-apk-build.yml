name: Android APK Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android_collector/**'
      - '.github/workflows/android-apk-build.yml'
  push:
    branches:
      - main
    paths:
      - 'android_collector/**'
      - '.github/workflows/android-apk-build.yml'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build MapeiaAI Android Collector APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: android_collector
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Prepare APK artifacts
        run: |
          mkdir -p artifacts
          cp android_collector/app/build/outputs/apk/debug/*.apk artifacts/mapeiaai-coletor-android-debug.apk
          cp artifacts/mapeiaai-coletor-android-debug.apk artifacts/mapeiaai-coletor-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapeiaai-coletor-android-debug-apk
          path: artifacts/mapeiaai-coletor-android-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-coletor-latest
          name: MapeiaAI Coletor Android - APK mais recente
          body: APK debug mais recente do MapeiaAI Coletor Android, gerado automaticamente pelo GitHub Actions.
          files: artifacts/mapeiaai-coletor-android.apk
          make_latest: false
