name: Streamlit Real Smoke

# Trigger manual de validação real do MapeiaAI/Streamlit.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  streamlit-real-smoke:
    name: Streamlit app + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python files
        run: |
          python -m compileall app.py bling_app_zero

      - name: Run automated tests
        run: |
          pytest -q tests/test_wizard_smoke.py tests/test_blingfix_flow_order.py tests/test_blingfix_rules_ai_split_marker.py

      - name: Start Streamlit app headless
        run: |
          nohup streamlit run app.py \
            --server.headless true \
            --server.address 127.0.0.1 \
            --server.port 8501 \
            --browser.gatherUsageStats false \
            > streamlit-smoke.log 2>&1 &
          echo $! > streamlit.pid

      - name: Wait for Streamlit HTTP response
        run: |
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:8501/ >/tmp/streamlit-home.html; then
              echo "Streamlit respondeu na tentativa $i"
              head -c 500 /tmp/streamlit-home.html
              exit 0
            fi
            sleep 2
          done
          echo "Streamlit não respondeu dentro do tempo. Log:"
          cat streamlit-smoke.log || true
          exit 1

      - name: Stop Streamlit
        if: always()
        run: |
          if [ -f streamlit.pid ]; then
            kill $(cat streamlit.pid) || true
          fi
          cat streamlit-smoke.log || true
