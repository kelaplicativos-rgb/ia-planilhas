name: BLINGSCAN FINAL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  blingscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Show Python version
        run: python --version
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run BLINGSCAN FINAL
        run: python tools/bling_scan_final.py
