name: Wizard Smoke Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  wizard-smoke:
    name: Wizard BLINGFIX smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install app and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest lxml

      - name: Compile Python files
        run: |
          python -m compileall app.py bling_app_zero

      - name: Run Wizard BLINGFIX smoke tests
        run: |
          pytest -q tests/test_wizard_smoke.py tests/test_blingfix_flow_order.py tests/test_blingfix_rules_ai_split_marker.py
