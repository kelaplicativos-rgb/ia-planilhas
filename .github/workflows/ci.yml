name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  blingfix-smoke:
    name: BLINGFIX smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python files
        run: |
          python -m compileall app.py bling_app_zero

      - name: Run BLINGFIX smoke tests
        run: |
          pytest -q tests/test_wizard_smoke.py tests/test_blingfix_flow_order.py tests/test_blingfix_rules_ai_split_marker.py
